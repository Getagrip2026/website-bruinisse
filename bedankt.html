<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bericht ontvangen – Samen Verder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <nav class="nav" aria-label="Hoofdnavigatie">
      <div class="container--wide nav__inner">
        <div class="nav__logos">
          <img src="brand_assets/logo cbs op dreef.png" alt="CBS Op Dreef" />
          <div class="nav__sep" aria-hidden="true"></div>
          <img src="brand_assets/logo obs de meerpaal .png" alt="OBS De Meerpaal" />
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section style="min-height: 60vh; display: flex; align-items: center;">
      <div class="container" style="text-align: center;">

        <div style="
          width: 64px; height: 64px;
          background: var(--color-green-50);
          border: 2px solid var(--color-green-100);
          border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          margin: 0 auto 24px;
        " aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="var(--color-green-500)" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <h1 style="margin-bottom: 12px;">Bedankt voor uw bericht</h1>
        <p class="lead" style="max-width: 480px; margin-inline: auto; margin-bottom: 32px;">
          We hebben uw vraag ontvangen en reageren binnen twee werkdagen.
        </p>
        <a href="index.html" class="btn btn--ghost">Terug naar de website</a>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container--wide footer__inner">
      <div class="footer__logos">
        <img src="brand_assets/logo cbs op dreef.png" alt="CBS Op Dreef Bruinisse" />
        <div class="nav__sep" aria-hidden="true"></div>
        <img src="brand_assets/logo obs de meerpaal .png" alt="OBS De Meerpaal Bruinisse" />
      </div>
      <p class="footer__text">
        © 2026 CBS Op Dreef &amp; OBS De Meerpaal, Bruinisse
      </p>
    </div>
  </footer>

</body>
</html>
